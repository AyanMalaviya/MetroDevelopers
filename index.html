<!DOCTYPE html>
<html lang="en-IN">
<head>

  <script>
    (function () {
      try {
        var key = 'metro-theme';
        var savedTheme = localStorage.getItem(key);
        var theme = (savedTheme === 'light' || savedTheme === 'dark')
          ? savedTheme
          : (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');

        var root = document.documentElement;
        root.setAttribute('data-theme', theme);
        root.classList.toggle('dark', theme === 'dark');
      } catch (err) {
        // Ignore initialization errors and continue with default theme.
      }
    })();
  </script>

  <script>
    (function () {
      try {
        var theme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';
        var browserThemeColor = theme === 'dark' ? '#0b0b0d' : '#f4f5f7';
        var themeColorMeta = document.querySelector("meta[name='theme-color']");
        var tileColorMeta = document.querySelector("meta[name='msapplication-TileColor']");
        if (themeColorMeta) themeColorMeta.setAttribute('content', browserThemeColor);
        if (tileColorMeta) tileColorMeta.setAttribute('content', browserThemeColor);
      } catch (err) {
        // Ignore metadata update errors.
      }
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <style>
    #splash {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      isolation: isolate;
      background: linear-gradient(160deg, #050506 0%, #111827 55%, #22090b 100%);
      transition: opacity 0.45s ease, visibility 0.45s ease;
    }
    html[data-theme='light'] #splash {
      background: linear-gradient(160deg, #ffffff 0%, #f8fafc 58%, #fee2e2 100%);
    }
    #splash::before {
      content: '';
      position: absolute;
      inset: -40%;
      background:
        radial-gradient(circle at 20% 30%, rgba(220, 38, 38, 0.28), transparent 48%),
        radial-gradient(circle at 80% 70%, rgba(220, 38, 38, 0.18), transparent 44%);
      animation: splashShift 9s linear infinite;
    }
    html[data-theme='light'] #splash::before {
      background:
        radial-gradient(circle at 20% 30%, rgba(220, 38, 38, 0.16), transparent 48%),
        radial-gradient(circle at 80% 70%, rgba(220, 38, 38, 0.12), transparent 44%);
    }
    #splash.hide {
      opacity: 0;
      visibility: hidden;
    }
    #splash-shell {
      position: relative;
      z-index: 2;
      width: min(420px, 88vw);
      padding: 28px 24px;
      border-radius: 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(0, 0, 0, 0.28);
      backdrop-filter: blur(14px);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35), inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }
    html[data-theme='light'] #splash-shell {
      border: 1px solid rgba(15, 23, 42, 0.1);
      background: rgba(255, 255, 255, 0.74);
      box-shadow: 0 20px 55px rgba(15, 23, 42, 0.14), inset 0 1px 0 rgba(255, 255, 255, 0.85);
    }
    #splash-logo-wrap {
      position: relative;
      width: 88px;
      height: 88px;
      display: grid;
      place-items: center;
    }
    #splash-logo-glow {
      position: absolute;
      inset: -12px;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(220, 38, 38, 0.34), rgba(220, 38, 38, 0));
      filter: blur(18px);
      animation: splashGlow 2.8s ease-in-out infinite;
    }
    #splash img {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.4);
      animation: splashPop 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
      position: relative;
      z-index: 2;
    }
    #splash-ring {
      position: absolute;
      inset: 0;
      border-radius: 999px;
      border: 2px solid rgba(255, 255, 255, 0.2);
      border-top-color: #dc2626;
      animation: splashSpin 1.8s linear infinite;
    }
    html[data-theme='light'] #splash-ring {
      border-color: rgba(15, 23, 42, 0.2);
      border-top-color: #dc2626;
    }
    #splash-title {
      font-family: 'Anton', system-ui, sans-serif;
      font-size: 26px;
      letter-spacing: 0.06em;
      line-height: 1;
      color: #f8fafc;
      text-transform: uppercase;
      text-align: center;
    }
    html[data-theme='light'] #splash-title {
      color: #111827;
    }
    #splash-subtitle {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #94a3b8;
      text-align: center;
      margin-top: -3px;
    }
    html[data-theme='light'] #splash-subtitle {
      color: #64748b;
    }
    #splash-bar-track {
      width: min(240px, 72vw);
      height: 4px;
      background: rgba(148, 163, 184, 0.2);
      border-radius: 99px;
      overflow: hidden;
    }
    html[data-theme='light'] #splash-bar-track {
      background: rgba(71, 85, 105, 0.2);
    }
    #splash-bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #991b1b 0%, #ef4444 45%, #f87171 100%);
      border-radius: 99px;
      animation: splashLoad 2.2s cubic-bezier(0.4,0,0.2,1) forwards;
    }
    #splash-status {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      color: #94a3b8;
      text-transform: uppercase;
    }
    #splash-status::after {
      content: '...';
      display: inline-block;
      width: 1.4em;
      overflow: hidden;
      vertical-align: bottom;
      animation: splashDots 1.2s steps(4, end) infinite;
    }
    html[data-theme='light'] #splash-status {
      color: #64748b;
    }
    @keyframes splashPop {
      from { opacity: 0; transform: scale(0.7); }
      to   { opacity: 1; transform: scale(1);   }
    }
    @keyframes splashSpin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    @keyframes splashGlow {
      0%, 100% { transform: scale(0.92); opacity: 0.7; }
      50%      { transform: scale(1.06); opacity: 1; }
    }
    @keyframes splashShift {
      0%   { transform: translate3d(0, 0, 0) rotate(0deg); }
      50%  { transform: translate3d(4%, -2%, 0) rotate(180deg); }
      100% { transform: translate3d(0, 0, 0) rotate(360deg); }
    }
    @keyframes splashLoad {
      0%   { width: 0%;    }
      20%  { width: 24%;   }
      45%  { width: 58%;   }
      75%  { width: 82%;   }
      100% { width: 100%;  }
    }
    @keyframes splashDots {
      0%   { width: 0; }
      100% { width: 1.4em; }
    }
    @media (prefers-reduced-motion: reduce) {
      #splash::before,
      #splash-logo-glow,
      #splash-ring,
      #splash-bar-fill,
      #splash-status::after {
        animation: none !important;
      }
    }
  </style>

</head>
<body>

  <div id="splash" role="status" aria-label="Loading Metro Enterprise">
    <div id="splash-shell">
      <div id="splash-logo-wrap" aria-hidden="true">
        <div id="splash-logo-glow"></div>
        <img src="/icons/icon-192x192.png" alt="Metro Enterprise" />
        <div id="splash-ring"></div>
      </div>
      <div id="splash-title">Metro Enterprise</div>
      <div id="splash-subtitle">Industrial Spaces in Ahmedabad</div>
      <div id="splash-bar-track" aria-hidden="true">
        <div id="splash-bar-fill"></div>
      </div>
      <span id="splash-status">Preparing your workspace</span>
    </div>
  </div>

  <div id="root"></div>

  <script type="module" src="/src/main.jsx"></script>

  <script>
    (function () {
      var splash = document.getElementById('splash');
      var root = document.getElementById('root');
      if (!splash || !root) return;

      var startedAt = Date.now();
      var minVisibleMs = 900;
      var maxVisibleMs = 5000;
      var isRemoved = false;

      function removeSplash() {
        if (isRemoved) return;
        isRemoved = true;
        splash.classList.add('hide');
        setTimeout(function () {
          if (splash && splash.parentNode) {
            splash.parentNode.removeChild(splash);
          }
        }, 500);
      }

      function removeWhenMinimumShown() {
        var elapsed = Date.now() - startedAt;
        var delay = Math.max(0, minVisibleMs - elapsed);
        setTimeout(removeSplash, delay);
      }

      var observer = new MutationObserver(function () {
        if (root.children.length > 0) {
          observer.disconnect();
          removeWhenMinimumShown();
        }
      });
      observer.observe(root, { childList: true });

      if (root.children.length > 0) {
        observer.disconnect();
        removeWhenMinimumShown();
      }

      setTimeout(function () {
        observer.disconnect();
        removeSplash();
      }, maxVisibleMs);
    })();
  </script>

</body>
</html>
