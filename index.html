<!DOCTYPE html>

  <script>
    (function () {
      try {
        var key = 'metro-theme';
        var savedTheme = localStorage.getItem(key);
        var theme = (savedTheme === 'light' || savedTheme === 'dark')
          ? savedTheme
          : (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');

        var root = document.documentElement;
        root.setAttribute('data-theme', theme);
        root.classList.toggle('dark', theme === 'dark');
      } catch (err) {
        // Ignore initialization errors and continue with default theme.
      }
    })();
  </script>

  <script>
    (function () {
      try {
        var theme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';
        var browserThemeColor = theme === 'dark' ? '#0b0b0d' : '#f4f5f7';
        var themeColorMeta = document.querySelector("meta[name='theme-color']");
        var tileColorMeta = document.querySelector("meta[name='msapplication-TileColor']");
        if (themeColorMeta) themeColorMeta.setAttribute('content', browserThemeColor);
        if (tileColorMeta) tileColorMeta.setAttribute('content', browserThemeColor);
      } catch (err) {
        // Ignore metadata update errors.
      }
    })();
  </script>

  <style>
    #splash {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      isolation: isolate;
      background: #0b0c0e;
      transition: opacity 0.45s ease, visibility 0.45s ease;
    }
    html[data-theme='light'] #splash {
      background: #f4f5f7;
    }

    /* removed ::before animated radial blob entirely */

    #splash.hide {
      opacity: 0;
      visibility: hidden;
    }
    #splash-shell {
      position: relative;
      z-index: 2;
      width: min(380px, 88vw);
      padding: 28px 24px;
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      border: 1px solid rgba(255, 255, 255, 0.07);
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(10px);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.28);
    }
    html[data-theme='light'] #splash-shell {
      border: 1px solid rgba(15, 23, 42, 0.09);
      background: rgba(255, 255, 255, 0.82);
      box-shadow: 0 12px 36px rgba(15, 23, 42, 0.1);
    }
    #splash-logo-wrap {
      position: relative;
      width: 88px;
      height: 88px;
      display: grid;
      place-items: center;
    }

    /* glow removed — replaced with a subtle static tint */
    #splash-logo-glow {
      display: none;
    }

    #splash img {
      width: 60px;
      height: 60px;
      border-radius: 14px;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.3);
      animation: splashPop 0.45s cubic-bezier(0.34,1.56,0.64,1) both;
      position: relative;
      z-index: 2;
    }
    #splash-ring {
      position: absolute;
      inset: 0;
      border-radius: 999px;
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-top-color: rgba(255, 255, 255, 0.45);
      animation: splashSpin 1.8s linear infinite;
    }
    html[data-theme='light'] #splash-ring {
      border-color: rgba(15, 23, 42, 0.12);
      border-top-color: rgba(15, 23, 42, 0.45);
    }
    #splash-title {
      font-family: 'Anton', system-ui, sans-serif;
      font-size: 24px;
      letter-spacing: 0.06em;
      line-height: 1;
      color: #e2e8f0;
      text-transform: uppercase;
      text-align: center;
    }
    html[data-theme='light'] #splash-title {
      color: #1e293b;
    }
    #splash-subtitle {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      color: #64748b;
      text-align: center;
      margin-top: -3px;
    }
    html[data-theme='light'] #splash-subtitle {
      color: #64748b;
    }
    #splash-bar-track {
      width: min(220px, 72vw);
      height: 3px;
      background: rgba(148, 163, 184, 0.15);
      border-radius: 99px;
      overflow: hidden;
    }
    html[data-theme='light'] #splash-bar-track {
      background: rgba(71, 85, 105, 0.15);
    }
    #splash-bar-fill {
      height: 100%;
      width: 0%;
      background: rgba(148, 163, 184, 0.6);
      border-radius: 99px;
      animation: splashLoad 2.2s cubic-bezier(0.4,0,0.2,1) forwards;
    }
    html[data-theme='light'] #splash-bar-fill {
      background: rgba(71, 85, 105, 0.55);
    }
    #splash-status {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.12em;
      color: #475569;
      text-transform: uppercase;
    }
    #splash-status::after {
      content: '...';
      display: inline-block;
      width: 1.4em;
      overflow: hidden;
      vertical-align: bottom;
      animation: splashDots 1.2s steps(4, end) infinite;
    }
    html[data-theme='light'] #splash-status {
      color: #64748b;
    }
    @keyframes splashPop {
      from { opacity: 0; transform: scale(0.78); }
      to   { opacity: 1; transform: scale(1);    }
    }
    @keyframes splashSpin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    @keyframes splashLoad {
      0%   { width: 0%;   }
      20%  { width: 24%;  }
      45%  { width: 58%;  }
      75%  { width: 82%;  }
      100% { width: 100%; }
    }
    @keyframes splashDots {
      0%   { width: 0;      }
      100% { width: 1.4em;  }
    }
    @media (prefers-reduced-motion: reduce) {
      #splash-ring,
      #splash-bar-fill,
      #splash-status::after {
        animation: none !important;
      }
    }
  </style>

</head>
<body>

  <div id="splash" role="status" aria-label="Loading Metro Enterprise">
    <div id="splash-shell">

      <span id="splash-status">Preparing your workspace</span>
    </div>
  </div>

  <div id="root"></div>

  <script type="module" src="/src/main.jsx"></script>

  <script>
    (function () {
      var splash = document.getElementById('splash');
      var root = document.getElementById('root');
      if (!splash || !root) return;

      var startedAt = Date.now();
      var minVisibleMs = 900;
      var maxVisibleMs = 5000;
      var isRemoved = false;

      function removeSplash() {
        if (isRemoved) return;
        isRemoved = true;
        splash.classList.add('hide');
        setTimeout(function () {
          if (splash && splash.parentNode) {
            splash.parentNode.removeChild(splash);
          }
        }, 500);
      }

      function removeWhenMinimumShown() {
        var elapsed = Date.now() - startedAt;
        var delay = Math.max(0, minVisibleMs - elapsed);
        setTimeout(removeSplash, delay);
      }

      var observer = new MutationObserver(function () {
        if (root.children.length > 0) {
          observer.disconnect();
          removeWhenMinimumShown();
        }
      });
      observer.observe(root, { childList: true });

      if (root.children.length > 0) {
        observer.disconnect();
        removeWhenMinimumShown();
      }

      setTimeout(function () {
        observer.disconnect();
        removeSplash();
      }, maxVisibleMs);
    })();
  </script>

</body>
