  <!-- ═══════════════════════════════════════

  <style>
    #splash {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      background: #0a0a0a;
      transition: opacity 0.4s ease, visibility 0.4s ease;
    }
    #splash.hide {
      opacity: 0;
      visibility: hidden;
    }
    #splash img {
      width: 72px;
      height: 72px;
      border-radius: 16px;
      animation: splashPop 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    #splash-bar-track {
      width: 180px;
      height: 3px;
      background: #1f1f1f;
      border-radius: 99px;
      overflow: hidden;
    }
    #splash-bar-fill {
      height: 100%;
      width: 0%;
      background: #DC2626;
      border-radius: 99px;
      animation: splashLoad 1.6s cubic-bezier(0.4,0,0.2,1) forwards;
    }
    #splash-label {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      color: #4b4b4b;
      text-transform: uppercase;
    }
    @keyframes splashPop {
      from { opacity: 0; transform: scale(0.7); }
      to   { opacity: 1; transform: scale(1);   }
    }
    @keyframes splashLoad {
      0%   { width: 0%;    }
      30%  { width: 40%;   }
      70%  { width: 75%;   }
      100% { width: 100%;  }
    }
  </style>

  <!-- Hide splash once React mounts -->
  <script>
    (function () {
      var splash = document.getElementById('splash');
      // Watch for #root to have children (React mounted)
      var observer = new MutationObserver(function () {
        if (document.getElementById('root').children.length > 0) {
          splash.classList.add('hide');
          setTimeout(function () { splash.remove(); }, 450);
          observer.disconnect();
        }
      });
      observer.observe(document.getElementById('root'), { childList: true });
      // Fallback — remove after 4s no matter what
      setTimeout(function () { splash.classList.add('hide'); }, 4000);
    })();
  </script>
